name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format --check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build tests
        run: cargo test --no-run
        working-directory: src-tauri

      - name: Diagnose DLL dependencies
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "target\debug\deps" -Filter "workbench_lib-*.exe" | Select-Object -First 1
          Write-Host "Test binary: $($exe.FullName)"

          # Check for any native DLLs in build tree
          Write-Host "`n=== Native DLLs in build tree ==="
          Get-ChildItem -Path "target\debug\build" -Recurse -Filter "*.dll" | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }

          # Check deps directory
          Write-Host "`n=== DLLs in deps directory ==="
          Get-ChildItem -Path "target\debug\deps" -Filter "*.dll" | ForEach-Object {
            Write-Host "  $($_.Name)"
          }

          # Use dumpbin to find imported DLLs
          Write-Host "`n=== DLL imports (dumpbin) ==="
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath 2>$null
          if ($vsPath) {
            $dumpbin = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Recurse -Filter "dumpbin.exe" |
              Where-Object { $_.FullName -match "Hostx64\\x64" } | Select-Object -First 1
            if ($dumpbin) {
              & $dumpbin.FullName /dependents $exe.FullName 2>&1 | Select-String "\.dll" | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "  dumpbin not found"
            }
          }

          # Try running the binary and check event log for details
          Write-Host "`n=== Attempting to run test binary ==="
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--list" -Wait -PassThru -NoNewWindow 2>$null
          Write-Host "Exit code: 0x$($proc.ExitCode.ToString('X'))"

          Write-Host "`n=== Recent SideBySide / Application errors ==="
          Get-WinEvent -FilterHashtable @{LogName='Application';Level=2} -MaxEvents 10 -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "  $($_.TimeCreated): $($_.Message.Substring(0, [Math]::Min(200, $_.Message.Length)))" }
        working-directory: src-tauri
        continue-on-error: true

      - name: Run Rust tests
        shell: pwsh
        run: |
          # Add all native build output dirs to PATH as fallback
          $dllDirs = Get-ChildItem -Path "target\debug\build" -Recurse -Filter "*.dll" |
            ForEach-Object { $_.DirectoryName } | Sort-Object -Unique
          foreach ($dir in $dllDirs) {
            $env:PATH = "$dir;$env:PATH"
          }
          cargo test
        working-directory: src-tauri
