name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format --check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build tests
        run: cargo test --no-run
        working-directory: src-tauri

      - name: Copy native DLLs to deps
        shell: pwsh
        run: |
          # Copy the x64 WebView2Loader.dll next to the test binaries
          $dll = Get-ChildItem -Path "src-tauri\target\debug\build" -Recurse -Filter "WebView2Loader.dll" |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName "src-tauri\target\debug\deps\"
            Write-Host "Copied $($dll.FullName) to deps"
          } else {
            Write-Host "WARNING: WebView2Loader.dll not found in build tree"
          }

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri
